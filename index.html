<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CrabKnife</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
      #crab_knife_loading {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        color: #e8e8e8;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }
      #crab_knife_loading.is-hidden {
        visibility: hidden;
        opacity: 0;
      }
      .loading-panel {
        width: min(360px, calc(100vw - 48px));
      }
      .loading-title {
        margin-bottom: 14px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
      }
      .loading-progress {
        position: relative;
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 4px;
        background: #2b2b2b;
      }
      .loading-progress-bar {
        position: absolute;
        left: -40%;
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: #6ea8fe;
        animation: loading-slide 1s ease-in-out infinite;
      }
      .loading-status {
        margin-top: 10px;
        color: #b8b8b8;
        font-size: 12px;
      }
      @keyframes loading-slide {
        from {
          left: -40%;
        }
        to {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="crab_knife_loading" role="status" aria-live="polite">
      <div class="loading-panel">
        <div class="loading-title">Loading CrabKnife</div>
        <div
          class="loading-progress"
          role="progressbar"
        >
          <div id="crab_knife_loading_bar" class="loading-progress-bar"></div>
        </div>
        <div class="loading-status">
          <span id="crab_knife_loading_text">Loading WebAssembly</span>
        </div>
      </div>
    </div>
    <canvas id="crab_knife_canvas"></canvas>
    <script>
      (() => {
        const loading = document.getElementById("crab_knife_loading");
        const text = document.getElementById("crab_knife_loading_text");

        window.crabKnifeWasmReady = () => {
          text.textContent = "Ready";
          window.setTimeout(() => {
            loading.classList.add("is-hidden");
          }, 160);
        };
      })();
    </script>
    <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="z" />
  </body>
</html>
